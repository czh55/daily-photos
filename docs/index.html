<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日摄影推荐 | Daily Photography</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #0a0a0a;
    --bg-card: #141414;
    --bg-card-hover: #1a1a1a;
    --text: #e0e0e0;
    --text-secondary: #888;
    --accent: #d4a853;
    --accent-dim: rgba(212, 168, 83, 0.15);
    --border: #222;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

  /* Header */
  header {
    padding: 60px 0 48px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  header .date {
    font-size: 13px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  header h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #e0e0e0 0%, #d4a853 50%, #e0e0e0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header .subtitle {
    font-size: 15px;
    color: var(--text-secondary);
    margin-top: 12px;
    font-weight: 400;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 48px;
    padding: 32px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* Filter tabs */
  .filter-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 8px 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #0a0a0a; border-color: var(--accent); font-weight: 600; }

  /* Gallery grid */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
    padding-bottom: 60px;
  }

  .photo-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .photo-card:hover {
    background: var(--bg-card-hover);
    border-color: #333;
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }
  .photo-card .img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    overflow: hidden;
    background: #1a1a1a;
  }
  .photo-card .img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }
  .photo-card:hover .img-wrap img { transform: scale(1.04); }
  .photo-card .img-wrap .badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    color: var(--accent);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .photo-card .img-wrap .rank {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    color: var(--text);
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 12px;
    font-weight: 600;
  }
  .photo-card .info {
    padding: 18px 20px;
  }
  .photo-card .info h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }
  .photo-card .info .photographer {
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .photo-card .info .desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
  }
  .photo-card .info .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .photo-card .info .tag {
    font-size: 11px;
    padding: 3px 10px;
    background: var(--accent-dim);
    color: var(--accent);
    border-radius: 10px;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 40px 0;
    border-top: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 13px;
  }
  footer span { color: var(--accent); }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 40px;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 85vh;
    border-radius: var(--radius);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .lightbox-close {
    position: absolute;
    top: 20px;
    right: 30px;
    background: none;
    border: none;
    color: #fff;
    font-size: 32px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .lightbox-close:hover { opacity: 1; }
  .lightbox .caption {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--text-secondary);
    font-size: 14px;
  }

  @media (max-width: 768px) {
    .gallery {
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    header { padding: 40px 0 32px; }
    .stats-bar { gap: 24px; }
    .photo-card .info { padding: 14px 16px; }
  }
</style>
</head>
<body>

<header class="container">
  <div class="date" id="todayDate"></div>
  <h1>每日摄影推荐</h1>
  <p class="subtitle">每天精选 20 幅优秀摄影作品，启迪你的视觉灵感</p>
</header>

<div class="stats-bar container">
  <div class="stat"><div class="stat-value">20</div><div class="stat-label">今日推荐</div></div>
  <div class="stat"><div class="stat-value">8</div><div class="stat-label">摄影大师</div></div>
  <div class="stat"><div class="stat-value">6</div><div class="stat-label">风格流派</div></div>
</div>

<div class="filter-bar container" id="filterBar"></div>

<div class="gallery container" id="gallery"></div>

<footer>
  <p>每日摄影推荐 &copy; <span id="footerYear"></span> · 自动更新于每日 9:00 · Powered by <span>Cursor Automations</span></p>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">&times;</button>
  <img id="lightboxImg" src="" alt="">
  <div class="caption" id="lightboxCaption"></div>
</div>

    tags: ["建筑", "晨雾", "城市"],

// Render date
const now = new Date();
const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
document.getElementById('todayDate').textContent = now.toLocaleDateString('zh-CN', options);
document.getElementById('footerYear').textContent = now.getFullYear();

// Get unique categories
const categories = ['全部', ...new Set(photos.map(p => p.category))];

// Render filter bar
const filterBar = document.getElementById('filterBar');
categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (cat === '全部' ? ' active' : '');
  btn.textContent = cat;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGallery(cat === '全部' ? null : cat);
  });
  filterBar.appendChild(btn);
});

// Render gallery
function renderGallery(filter) {
  const gallery = document.getElementById('gallery');
  const filtered = filter ? photos.filter(p => p.category === filter) : photos;
  gallery.innerHTML = filtered.map((p, i) => `
    <div class="photo-card" data-index="${i}" data-img="${p.img}" data-caption="${p.title} — ${p.photographer}">
      <div class="img-wrap">
        <img src="${p.img}" alt="${p.title}" loading="lazy">
        <span class="badge">${p.tags[0]}</span>
        <span class="rank">#${i + 1}</span>
      </div>
      <div class="info">
        <h3>${p.title}</h3>
        <p class="photographer">${p.photographer}</p>
        <p class="desc">${p.desc}</p>
        <div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');

  // Lightbox
  document.querySelectorAll('.photo-card').forEach(card => {
    card.addEventListener('click', () => {
      const img = card.dataset.img;
      const caption = card.dataset.caption;
      document.getElementById('lightboxImg').src = img;
      document.getElementById('lightboxCaption').textContent = caption;
      document.getElementById('lightbox').classList.add('active');
    });
  });
}

document.getElementById('lightboxClose').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('active');
});
document.getElementById('lightbox').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) document.getElementById('lightbox').classList.remove('active');
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active');
});

// Initial render
renderGallery(null);
</script>

</body>
</html>
