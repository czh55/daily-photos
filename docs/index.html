(function() {
  var footerYearEl = document.getElementById('footerYear');
  if (footerYearEl) footerYearEl.textContent = new Date().getFullYear();

  var categories = ['全部'].concat(
    Array.from(new Set(photos.map(function(p) { return p.category; })))
  );

  var filterBar = document.getElementById('filterBar');
  categories.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === '全部' ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', function() {
      var buttons = document.querySelectorAll('.filter-btn');
      for (var i = 0; i < buttons.length; i++) buttons[i].classList.remove('active');
      btn.classList.add('active');
      renderGallery(cat === '全部' ? null : cat);
    });
    filterBar.appendChild(btn);
  });

  function sourceLabel(src) {
    var labels = {
      openverse: 'Openverse',
      wikimedia: 'Wikimedia',
      nasa: 'NASA',
      met: 'Met Museum',
      unsplash: 'Unsplash',
      pexels: 'Pexels',
      pixabay: 'Pixabay',
      rawpixel: 'Rawpixel'
    };
    return labels[src] || src || '';
  }

  function renderGallery(filter) {
    var gallery = document.getElementById('gallery');
    var filtered = filter ? photos.filter(function(p) { return p.category === filter; }) : photos;
    gallery.innerHTML = filtered.map(function(p, i) {
      var srcLine = p.source ? '<p class="source-label">' + sourceLabel(p.source) + '</p>' : '';
      return '<div class="photo-card" data-index="' + i + '" data-img="' + p.img + '" data-caption="' + p.title + ' \u2014 ' + p.photographer + '">' +
        '<div class="img-wrap">' +
          '<img src="' + p.img + '" alt="' + p.title + '" loading="lazy">' +
          '<span class="badge">' + p.tags[0] + '</span>' +
          '<span class="rank">#' + (i + 1) + '</span>' +
        '</div>' +
        '<div class="info">' +
          '<h3>' + p.title + '</h3>' +
          '<p class="photographer">' + p.photographer + '</p>' +
          srcLine +
          '<p class="desc">' + p.desc + '</p>' +
          '<div class="tags">' + p.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('') + '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    var cards = document.querySelectorAll('.photo-card');
    for (var j = 0; j < cards.length; j++) {
      cards[j].addEventListener('click', function() {
        document.getElementById('lightboxImg').src = this.dataset.img;
        document.getElementById('lightboxCaption').textContent = this.dataset.caption;
        document.getElementById('lightbox').classList.add('active');
      });
    }
  }

  document.getElementById('lightboxClose').addEventListener('click', function() {
    document.getElementById('lightbox').classList.remove('active');
  });
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) document.getElementById('lightbox').classList.remove('active');
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active');
  });

  renderGallery(null);
})();
</script>
