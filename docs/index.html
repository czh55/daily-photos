.org/CRDImages/ph/original/DP150956.jpg", "category": "光影", "source": "met", "source_url": "https://www.metmuseum.org/art/collection/search/285467", "id": 515}, {"title": "<em>Sib</em> sphinx for a barque", "photographer": "Met Museum", "desc": "构图上，<em>Sib</em> sphinx for a barque以肖像元素形成清晰视觉焦点；光影层次丰富，明暗对比赋予画面深度与空间感；情感表达上，Met Museum的镜头传递出对肖像题材的独到观察与共鸣。", "tags": ["肖像", "met", "art"], "img": "https://images.metmuseum.org/CRDImages/eg/original/DP-39623-001.jpg", "category": "肖像", "source": "met", "source_url": "https://www.metmuseum.org/art/collection/search/590745", "id": 486}, {"title": "Francis I (1494–1547), King of France", "photographer": "Joos van Cleve", "desc": "构图上，Francis I (1494–1547), King of France以肖像元素形成清晰视觉焦点；光影层次丰富，明暗对比赋予画面深度与空间感；情感表达上，Joos van Cleve的镜头传递出对肖像题材的独到观察与共鸣。", "tags": ["肖像", "met", "art"], "img": "https://images.metmuseum.org/CRDImages/ep/original/DP350013.jpg", "category": "肖像", "source": "met", "source_url": "https://www.metmuseum.org/art/collection/search/436796", "id": 338}, {"title": "Cypresses", "photographer": "Vincent van Gogh", "desc": "构图上，Cypresses以建筑元素形成清晰视觉焦点；光影层次丰富，明暗对比赋予画面深度与空间感；情感表达上，Vincent van Gogh的镜头传递出对建筑题材的独到观察与共鸣。", "tags": ["建筑", "met", "art"], "img": "https://images.metmuseum.org/CRDImages/ep/original/DP130999.jpg", "category": "建筑", "source": "met", "source_url": "https://www.metmuseum.org/art/collection/search/437980", "id": 436}, {"title": "The Last Supper", "photographer": "Netherlandish (Antwerp Mannerist) Painters", "desc": "构图上，The Last Supper以肖像元素形成清晰视觉焦点；光影层次丰富，明暗对比赋予画面深度与空间感；情感表达上，Netherlandish (Antwerp Mannerist) Painters的镜头传递出对肖像题材的独到观察与共鸣。", "tags": ["肖像", "met", "art"], "img": "https://images.metmuseum.org/CRDImages/ep/original/DT2910.jpg", "category": "肖像", "source": "met", "source_url": "https://www.metmuseum.org/art/collection/search/437213", "id": 512}, {"title": "Michelangelo Buonarroti (1475–1564)", "photographer": "Daniele da Volterra", "desc": "构图上，Michelangelo Buonarroti (1475–1564)以纪实元素形成清晰视觉 (function() {
  var footerYearEl = document.getElementById('footerYear');
  if (footerYearEl) footerYearEl.textContent = new Date().getFullYear();

  var categories = ['全部'].concat(
    Array.from(new Set(photos.map(function(p) { return p.category; })))
  );

  var filterBar = document.getElementById('filterBar');
  categories.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === '全部' ? ' active' : '');
    btn.textContent = cat;
    btn.addEventListener('click', function() {
      var buttons = document.querySelectorAll('.filter-btn');
      for (var i = 0; i < buttons.length; i++) buttons[i].classList.remove('active');
      btn.classList.add('active');
      renderGallery(cat === '全部' ? null : cat);
    });
    filterBar.appendChild(btn);
  });

  function sourceLabel(src) {
    var labels = {
      openverse: 'Openverse',
      wikimedia: 'Wikimedia',
      nasa: 'NASA',
      met: 'Met Museum',
      unsplash: 'Unsplash',
      pexels: 'Pexels',
      pixabay: 'Pixabay',
      rawpixel: 'Rawpixel'
    };
    return labels[src] || src || '';
  }

  function renderGallery(filter) {
    var gallery = document.getElementById('gallery');
    var filtered = filter ? photos.filter(function(p) { return p.category === filter; }) : photos;
    gallery.innerHTML = filtered.map(function(p, i) {
      var srcLine = p.source ? '<p class="source-label">' + sourceLabel(p.source) + '</p>' : '';
      return '<div class="photo-card" data-index="' + i + '" data-img="' + p.img + '" data-caption="' + p.title + ' \u2014 ' + p.photographer + '">' +
        '<div class="img-wrap">' +
          '<img src="' + p.img + '" alt="' + p.title + '" loading="lazy">' +
          '<span class="badge">' + p.tags[0] + '</span>' +
          '<span class="rank">#' + (i + 1) + '</span>' +
        '</div>' +
        '<div class="info">' +
          '<h3>' + p.title + '</h3>' +
          '<p class="photographer">' + p.photographer + '</p>' +
          srcLine +
          '<p class="desc">' + p.desc + '</p>' +
          '<div class="tags">' + p.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('') + '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    var cards = document.querySelectorAll('.photo-card');
    for (var j = 0; j < cards.length; j++) {
      cards[j].addEventListener('click', function() {
        document.getElementById('lightboxImg').src = this.dataset.img;
        document.getElementById('lightboxCaption').textContent = this.dataset.caption;
        document.getElementById('lightbox').classList.add('active');
      });
    }
  }

  document.getElementById('lightboxClose').addEventListener('click', function() {
    document.getElementById('lightbox').classList.remove('active');
  });
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) document.getElementById('lightbox').classList.remove('active');
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active');
  });

  renderGallery(null);
})();
</script>
